name: ShelfScout
options:
  bundleIdPrefix: com.vlmkit.example
  deploymentTarget:
    iOS: "17.0"

# Local dependency on the VLMKit package at the repository root.
packages:
  VLMKit:
    path: ../..

targets:
  ShelfScout:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: VLMKit
        product: VLMKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vlmkit.example.shelfscout
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        # On-device only; these usage strings are required for the image picker.
        INFOPLIST_KEY_NSCameraUsageDescription: "ShelfScout scans retail shelves with the camera, fully on-device."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "ShelfScout reads a photo to scan a retail shelf, fully on-device."
