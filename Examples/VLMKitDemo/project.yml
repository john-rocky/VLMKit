name: VLMKitDemo
options:
  bundleIdPrefix: com.vlmkit.example
  deploymentTarget:
    iOS: "18.0"

# Local dependency on the VLMKit package at the repository root.
packages:
  VLMKit:
    path: ../..
  # apple/ml-stable-diffusion supplies the CoreML wrappers for the HyperSD
  # text encoder, decoder, and BPE tokenizer used by the Background Studio's
  # Diffusion mode. The Unet wrapper's `predictNoise` is internal, so the
  # Diffusion pipeline drives the chunked Unet `.mlpackage`s directly with
  # CoreML — see `Backgrounds/HyperSD/MiniUnet.swift`.
  StableDiffusion:
    url: https://github.com/apple/ml-stable-diffusion
    from: 1.1.0
  # ZIPFoundation extracts the 4 HyperSD release zips into
  # `Documents/HyperSDModels/` on first use of the Diffusion mode. iOS has no
  # built-in zip extractor; this is the standard SPM choice.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  VLMKitDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: VLMKit
        product: VLMKit
      # SAMKit (MobileSAM) is intentionally omitted — ROI Zoom is hidden from
      # the menu and SAMROIProvider uses `#if canImport(SAMKit)` so the build
      # works without it. Re-add this block to bring ROI Zoom back to the menu.
      - package: StableDiffusion
        product: StableDiffusion
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vlmkit.example.shelfscout
        # App name shown on the home screen. The bundle id deliberately stays
        # `.shelfscout` (the original target name) so the model sideloaded into
        # the existing app container is preserved — the container is keyed by
        # bundle id, not display name or target name.
        INFOPLIST_KEY_CFBundleDisplayName: VLMKit
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        # On-device only; these usage strings are required for the image picker.
        INFOPLIST_KEY_NSCameraUsageDescription: "VLMKit analyzes what the camera sees, fully on-device."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "VLMKit analyzes a photo you choose, fully on-device."
        # Required for the Business Card demo's "Save to Contacts" flow — the
        # CNContactViewController preview writes to Contacts when the user taps Done.
        INFOPLIST_KEY_NSContactsUsageDescription: "VLMKit saves a business card you scan into Apple Contacts when you confirm."
        # Expose the app's Documents folder in Finder/Files so a model can be
        # sideloaded via USB (see README) instead of downloaded on every install.
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        # Generate an empty UILaunchScreen so the app uses the full screen.
        # Without it iOS letterboxes the app (black bars top & bottom, shrunken UI).
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    # Raise the iOS per-app memory limit so the multi-GB VLM weights + activations
    # fit without jetsam killing the app (required for large on-device models).
    entitlements:
      path: VLMKitDemo.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
        com.apple.developer.kernel.extended-virtual-addressing: true
